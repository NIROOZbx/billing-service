version: "2"
sql:
  - schema: 
      - "db/migrations"
      - "db/schema/external_schema.sql"
    queries: "db/query"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "db/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
