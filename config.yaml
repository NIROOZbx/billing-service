app:
  name: "billing-service"
  port: "50051"
  http_port: "8081"
  environment: "development"

database:
  max_open_conns: 50
  min_open_conns: 25
  max_idle_conns: 25
  max_conn_lifetime: "30m"
  max_idle_time: "5m"

log:
  level: "info"
  file: "logs/billing-service.log"
  max_size_mb: 50
  max_backups: 3
  max_age_days: 28

kafka:
  broker_address: "localhost:9093"
  batch_size: 100
  batch_timeout_ms: 10